name: Go Build

on:
    workflow_call:
        # inputs:
        #     go-version:
        #         required: true
        #         type: string

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                go-version-file: 'go.mod'
                # go-version: {{ inputs.go-version }}

            - run: go vet ./...
            - run: go test ./..
            - run: go build ./...