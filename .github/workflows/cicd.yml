name: Go CI/CD

on:
    workflow_dispatch:
    # push:
    #     branches:
    #         - master

jobs:
    build-test-deploy:
        runs-on: ubuntu-latest
    
        env:
            IMAGE_NAME: tenome
    
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7
            
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version-file: 'go.mod'
            
            - name: Check formatting
              run: test -z "$(gofmt -l .)"
            
            - name: Run Vet
              run: go vet ./...

            - name: Run Test
              run: go test ./...

            - name: Build binary
              run: go build -o tenome ./cmd/server

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: Build and Push Docker Image
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USERNAME }}/tenome:latest
                    ${{ vars.DOCKERHUB_USERNAME }}/tenome:${{ github.sha }}

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ vars.EC2_USER }}
                key: ${{ secrets.EC2_KEY }}
                port: 22
                script: |
                    docker pull ${{ vars.DOCKERHUB_USERNAME }}/tenome:latest
                    docker rm -f tenome || true
                    docker run -d \
                        --name tenome \
                        --network tenome-net \
                        --restart unless-stopped \
                        -p 8050:8050 \
                        -e DB_PATH=/data/crawler.db \
                        -e REDIS_ADDR=dragonfly:6379 \
                        -v /opt/tenome/data:/data \
                        ${{ vars.DOCKERHUB_USERNAME }}/tenome:latest





        